<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ivoes Page | Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="shop">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">Ivoes Page</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="smog.html">Smog</a></li>
        <li><a href="homes.html">Homes</a></li>
        <li><a class="active" href="shop.html">Shop</a></li>
        <li><a href="donation.html">Donations</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div>
        <p class="kicker" data-page-content="hero.kicker"></p>
        <h1 data-page-content="hero.title"></h1>
        <p data-page-content="hero.description"></p>
      </div>
      <aside class="hero-panel reveal">
        <h2 data-page-content="hero.panelTitle"></h2>
        <ul data-section="panel-items"></ul>
      </aside>
    </section>

    <section>
      <h2 class="section-title" data-page-content="productsTitle"></h2>
      <div class="grid" data-section="products"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-shell">
      <div class="footer-link-groups">
        <section class="footer-group">
          <h3>Social</h3>
          <div class="footer-icon-list" data-links="social"></div>
        </section>
        <section class="footer-group">
          <h3>Donations</h3>
          <div class="footer-icon-list" data-links="donations"></div>
        </section>
      </div>
      <p class="copyright" data-content="site.copyright">Copyright 2026 Ivoes Page. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/content-shop.js"></script>
  <script src="assets/js/content.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
